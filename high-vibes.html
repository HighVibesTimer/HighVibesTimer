<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#d9bb9b" id="theme-color-meta">
<title>High Vibes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #d9bb9b;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1916;
    --muted: #7a6a5a;
    --accent: #effd5f;
    --accent-text: #1a1916;
    --violet: #7f7caf;
  }
  [data-theme="dark"] {
    --bg: #1f2737;
    --surface: #7a7b7a;
    --border: rgba(255,255,255,0.1);
    --text: #f0ede8;
    --muted: #c8c8c4;
    --accent: #f3a712;
    --accent-text: #1a1916;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.35s, color 0.35s;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 420px;
    margin: 0 auto;
    width: 100%;
    padding: 0 24px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 0 0;
  }

  .app-title {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .title-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #7f7caf;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .title-text {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--text);
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
  }
  .icon-btn:active { transform: scale(0.93); }

  /* Phase tabs */
  .phase-tabs {
    display: flex;
    gap: 6px;
    margin: 28px 0 0;
    background: rgba(0,0,0,0.08);
    border-radius: 10px;
    padding: 4px;
  }
  [data-theme="dark"] .phase-tabs {
    background: rgba(255,255,255,0.08);
  }
  .phase-tab {
    flex: 1;
    padding: 8px 4px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .phase-tab.active {
    background: var(--surface);
    color: var(--text);
  }

  /* Timer area */
  .timer-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 0;
  }

  .timer-ring-wrap {
    position: relative;
    width: 240px;
    height: 240px;
    margin-bottom: 32px;
  }

  .timer-svg {
    width: 240px;
    height: 240px;
    transform: rotate(-90deg);
  }

  .ring-bg {
    fill: none;
    stroke: rgba(0,0,0,0.12);
    stroke-width: 2.5;
  }
  [data-theme="dark"] .ring-bg {
    stroke: rgba(255,255,255,0.12);
  }

  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2.5;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }

  .timer-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .timer-display {
    font-size: 58px;
    font-weight: 200;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .timer-phase-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 400;
  }

  /* Cycle dots */
  .cycle-dots {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    border: 1px solid var(--muted);
    background: transparent;
    transition: all 0.3s;
  }
  .dot.done {
    background: var(--accent);
    border-color: var(--accent);
  }
  .dot.active {
    border-color: var(--text);
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 12px;
  }

  .ctrl-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 16px;
  }

  .play-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 22px;
  }

  .play-btn:active { transform: scale(0.91); }
  .ctrl-btn:active { transform: scale(0.91); }

  /* Stats */
  .stats-bar {
    display: flex;
    gap: 10px;
    padding: 16px 0 28px;
  }

  .stat-card {
    flex: 1;
    background: var(--surface);
    border-radius: 14px;
    padding: 14px 12px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 400;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 200;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .stat-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }

  /* Settings panel */
  .settings-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .settings-panel.open { display: block; }

  .settings-inner {
    max-width: 420px;
    margin: 0 auto;
    padding: 24px 24px 48px;
  }

  .settings-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 36px;
  }

  .settings-title {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text);
  }

  .close-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
  }

  .setting-group {
    margin-bottom: 32px;
  }

  .setting-group-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .setting-row:last-child { border-bottom: none; }

  .setting-name {
    font-size: 14px;
    color: var(--text);
    font-weight: 300;
  }
  .setting-name small {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
    letter-spacing: 0.03em;
  }

  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    justify-content: flex-end;
  }

  .slider-val {
    font-size: 20px;
    font-weight: 200;
    min-width: 32px;
    text-align: right;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    width: 110px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }

  .toggle {
    width: 44px;
    height: 26px;
    background: var(--border);
    border-radius: 13px;
    position: relative;
    cursor: pointer;
    transition: background 0.25s;
    border: none;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: white;
    top: 3px;
    left: 3px;
    transition: transform 0.25s;
  }
  .toggle.on::after { transform: translateX(18px); }

  /* Banner */
  .banner {
    position: fixed;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.03em;
    transition: top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200;
    white-space: nowrap;
    max-width: calc(100vw - 48px);
    text-align: center;
  }
  .banner.show { top: 24px; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .pulsing .timer-display { animation: pulse 2s ease-in-out infinite; }
</style>
</head>
<body>
<div id="banner" class="banner"></div>

<div class="app">
  <div class="header">
    <div class="app-title">
      <div class="title-dot"></div>
      <span class="title-text">High Vibes</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="theme-btn">☽</button>
      <button class="icon-btn" id="settings-btn">⚙</button>
    </div>
  </div>

  <div class="phase-tabs">
    <button class="phase-tab active" id="tab-focus">Lernen</button>
    <button class="phase-tab" id="tab-short">Kurzpause</button>
    <button class="phase-tab" id="tab-long">Große Pause</button>
  </div>

  <div class="timer-area">
    <div class="timer-ring-wrap">
      <svg class="timer-svg" viewBox="0 0 240 240">
        <circle class="ring-bg" cx="120" cy="120" r="108"/>
        <circle class="ring-progress" id="ring" cx="120" cy="120" r="108"
          stroke-dasharray="678.6" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-center">
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-phase-label" id="phase-label">Lernzeit</div>
      </div>
    </div>

    <div class="cycle-dots" id="cycle-dots"></div>

    <div class="controls">
      <button class="ctrl-btn" id="reset-btn">↺</button>
      <button class="play-btn" id="play-btn">▶</button>
      <button class="ctrl-btn" id="skip-btn">⇥</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Heute</div>
      <div class="stat-value" id="stat-today">0</div>
      <div class="stat-sub">Pomodoros</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Fokuszeit</div>
      <div class="stat-value" id="stat-minutes">0</div>
      <div class="stat-sub">Minuten</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Runden</div>
      <div class="stat-value" id="stat-cycles">0</div>
      <div class="stat-sub">abgeschlossen</div>
    </div>
  </div>
</div>

<!-- Settings -->
<div class="settings-panel" id="settings-panel">
  <div class="settings-inner">
    <div class="settings-header">
      <span class="settings-title">Einstellungen</span>
      <button class="close-btn" id="close-settings">✕</button>
    </div>

    <div class="setting-group">
      <div class="setting-group-label">Zeiten</div>
      <div class="setting-row">
        <div class="setting-name">Lernzeit<small>Minuten</small></div>
        <div class="slider-wrap">
          <input type="range" min="1" max="60" value="25" id="s-focus" step="1">
          <span class="slider-val" id="v-focus">25</span>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-name">Kurzpause<small>Minuten</small></div>
        <div class="slider-wrap">
          <input type="range" min="1" max="30" value="5" id="s-short" step="1">
          <span class="slider-val" id="v-short">5</span>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-name">Große Pause<small>Minuten</small></div>
        <div class="slider-wrap">
          <input type="range" min="5" max="60" value="15" id="s-long" step="1">
          <span class="slider-val" id="v-long">15</span>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-name">Zyklen<small>bis zur großen Pause</small></div>
        <div class="slider-wrap">
          <input type="range" min="1" max="8" value="4" id="s-cycles" step="1">
          <span class="slider-val" id="v-cycles">4</span>
        </div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-group-label">Benachrichtigungen</div>
      <div class="setting-row">
        <div class="setting-name">Sound</div>
        <button class="toggle on" id="t-sound"></button>
      </div>
      <div class="setting-row">
        <div class="setting-name">Vibration</div>
        <button class="toggle on" id="t-vibrate"></button>
      </div>
    </div>
  </div>
</div>

<script>
const CIRC = 2 * Math.PI * 108;

const state = {
  phase: 'focus', running: false,
  secondsLeft: 0, totalSeconds: 0,
  currentCycle: 0, completedCycles: 0,
  todayPomodoros: 0, todayMinutes: 0,
  intervalId: null, targetEnd: null,
};

const settings = {
  focus: 25, short: 5, long: 15, cycles: 4,
  sound: true, vibrate: true, theme: 'light',
};

function loadStorage() {
  try {
    const s = JSON.parse(localStorage.getItem('hv-settings') || '{}');
    Object.assign(settings, s);
    const today = new Date().toDateString();
    const d = JSON.parse(localStorage.getItem('hv-stats') || '{}');
    if (d.date === today) {
      state.todayPomodoros = d.pomodoros || 0;
      state.todayMinutes = d.minutes || 0;
    }
  } catch(e) {}
}

function saveSettings() { localStorage.setItem('hv-settings', JSON.stringify(settings)); }
function saveStats() {
  localStorage.setItem('hv-stats', JSON.stringify({
    date: new Date().toDateString(),
    pomodoros: state.todayPomodoros,
    minutes: state.todayMinutes,
  }));
}

let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playNotes(notes) {
  if (!settings.sound) return;
  try {
    const c = getAudio();
    notes.forEach(({f, t, d, v}) => {
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = 'sine'; osc.frequency.value = f;
      gain.gain.setValueAtTime(0, c.currentTime + t);
      gain.gain.linearRampToValueAtTime(v || 0.18, c.currentTime + t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + t + d);
      osc.start(c.currentTime + t);
      osc.stop(c.currentTime + t + d + 0.05);
    });
  } catch(e) {}
}

function playSound(type) {
  const tones = {
    focus: [{f:880,t:0,d:0.18},{f:1100,t:0.22,d:0.28}],
    short: [{f:660,t:0,d:0.2},{f:528,t:0.24,d:0.32}],
    done:  [{f:880,t:0,d:0.12},{f:1100,t:0.16,d:0.12},{f:1320,t:0.32,d:0.38}],
  };
  playNotes(tones[type] || tones.focus);
}

function vibrate(p) { if (settings.vibrate && navigator.vibrate) navigator.vibrate(p); }

function showBanner(msg) {
  const b = document.getElementById('banner');
  b.textContent = msg;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 2800);
}

function fmt(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function getPhaseMins() {
  return settings[state.phase === 'focus' ? 'focus' : state.phase === 'short' ? 'short' : 'long'];
}

function getPhaseLabel() {
  return state.phase === 'focus' ? 'Lernzeit' : state.phase === 'short' ? 'Kurzpause' : 'Große Pause';
}

function updateDisplay() {
  document.getElementById('timer-display').textContent = fmt(state.secondsLeft);
  document.getElementById('phase-label').textContent = getPhaseLabel();

  const progress = state.totalSeconds > 0 ? (1 - state.secondsLeft / state.totalSeconds) : 0;
  document.getElementById('ring').style.strokeDashoffset = CIRC * (1 - progress);

  ['tab-focus','tab-short','tab-long'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById({focus:'tab-focus',short:'tab-short',long:'tab-long'}[state.phase]).classList.add('active');

  document.getElementById('stat-today').textContent = state.todayPomodoros;
  document.getElementById('stat-minutes').textContent = state.todayMinutes;
  document.getElementById('stat-cycles').textContent = state.completedCycles;

  renderDots();
}

function renderDots() {
  const c = document.getElementById('cycle-dots');
  c.innerHTML = '';
  for (let i = 0; i < settings.cycles; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    if (i < state.currentCycle) d.classList.add('done');
    else if (i === state.currentCycle && state.phase === 'focus') d.classList.add('active');
    c.appendChild(d);
  }
}

function initPhase(phase) {
  state.phase = phase;
  const mins = getPhaseMins();
  state.secondsLeft = mins * 60;
  state.totalSeconds = mins * 60;
  state.running = false;
  clearInterval(state.intervalId);
  document.getElementById('play-btn').textContent = '▶';
  document.querySelector('.timer-area').classList.remove('pulsing');
  updateDisplay();
}

function tick() {
  if (!state.running) return;
  const remaining = Math.max(0, Math.round((state.targetEnd - Date.now()) / 1000));
  state.secondsLeft = remaining;
  updateDisplay();
  if (remaining <= 0) phaseComplete();
}

function phaseComplete() {
  clearInterval(state.intervalId);
  state.running = false;
  document.getElementById('play-btn').textContent = '▶';
  document.querySelector('.timer-area').classList.remove('pulsing');

  if (state.phase === 'focus') {
    state.todayPomodoros++;
    state.todayMinutes += settings.focus;
    saveStats();
    const next = state.currentCycle + 1;
    if (next >= settings.cycles) {
      state.currentCycle = 0;
      state.completedCycles++;
      playSound('done');
      vibrate([200,100,200,100,400]);
      showBanner('Super! Große Pause verdient 🎉');
      setTimeout(() => initPhase('long'), 600);
    } else {
      state.currentCycle = next;
      playSound('short');
      vibrate([100,50,200]);
      showBanner('Gut gemacht! Zeit für eine Pause.');
      setTimeout(() => initPhase('short'), 600);
    }
  } else {
    playSound('focus');
    vibrate([200,100,100]);
    showBanner(state.phase === 'long' ? 'Bereit? Weiter geht\'s!' : 'Pause vorbei – fokussieren!');
    setTimeout(() => initPhase('focus'), 600);
  }
}

function startStop() {
  if (state.running) {
    state.running = false;
    clearInterval(state.intervalId);
    document.getElementById('play-btn').textContent = '▶';
    document.querySelector('.timer-area').classList.remove('pulsing');
  } else {
    try { getAudio().resume(); } catch(e) {}
    state.running = true;
    state.targetEnd = Date.now() + state.secondsLeft * 1000;
    state.intervalId = setInterval(tick, 500);
    document.getElementById('play-btn').textContent = '⏸';
    document.querySelector('.timer-area').classList.add('pulsing');
  }
}

function resetTimer() {
  clearInterval(state.intervalId);
  state.running = false;
  document.getElementById('play-btn').textContent = '▶';
  document.querySelector('.timer-area').classList.remove('pulsing');
  initPhase(state.phase);
}

function skipPhase() {
  clearInterval(state.intervalId);
  state.running = false;
  document.getElementById('play-btn').textContent = '▶';
  document.querySelector('.timer-area').classList.remove('pulsing');
  if (state.phase === 'focus') {
    const next = state.currentCycle + 1;
    if (next >= settings.cycles) { state.currentCycle = 0; initPhase('long'); }
    else { state.currentCycle = next; initPhase('short'); }
  } else {
    initPhase('focus');
  }
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', settings.theme);
  document.getElementById('theme-color-meta').content = settings.theme === 'dark' ? '#1f2737' : '#d9bb9b';
  document.getElementById('theme-btn').textContent = settings.theme === 'dark' ? '☀' : '☽';
}

document.getElementById('play-btn').addEventListener('click', startStop);
document.getElementById('reset-btn').addEventListener('click', resetTimer);
document.getElementById('skip-btn').addEventListener('click', skipPhase);
document.getElementById('tab-focus').addEventListener('click', () => initPhase('focus'));
document.getElementById('tab-short').addEventListener('click', () => initPhase('short'));
document.getElementById('tab-long').addEventListener('click', () => initPhase('long'));

document.getElementById('theme-btn').addEventListener('click', () => {
  settings.theme = settings.theme === 'light' ? 'dark' : 'light';
  applyTheme(); saveSettings();
});

document.getElementById('settings-btn').addEventListener('click', () => {
  document.getElementById('settings-panel').classList.add('open');
});

document.getElementById('close-settings').addEventListener('click', () => {
  document.getElementById('settings-panel').classList.remove('open');
  initPhase(state.phase);
});

function bindSlider(id, key, valId) {
  const s = document.getElementById(id);
  const v = document.getElementById(valId);
  s.value = settings[key];
  v.textContent = settings[key];
  s.addEventListener('input', () => {
    settings[key] = parseInt(s.value);
    v.textContent = s.value;
    saveSettings(); renderDots();
  });
}

bindSlider('s-focus','focus','v-focus');
bindSlider('s-short','short','v-short');
bindSlider('s-long','long','v-long');
bindSlider('s-cycles','cycles','v-cycles');

function bindToggle(id, key) {
  const btn = document.getElementById(id);
  btn.classList.toggle('on', settings[key]);
  btn.addEventListener('click', () => {
    settings[key] = !settings[key];
    btn.classList.toggle('on', settings[key]);
    saveSettings();
  });
}

bindToggle('t-sound','sound');
bindToggle('t-vibrate','vibrate');

const swCode = `
self.addEventListener('install', () => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
let iv = null;
self.addEventListener('message', e => {
  const {type, payload} = e.data;
  if (type === 'START') {
    const end = payload.endTime;
    if (iv) clearInterval(iv);
    iv = setInterval(() => {
      const r = Math.max(0, Math.round((end - Date.now()) / 1000));
      self.clients.matchAll().then(cs => cs.forEach(c => c.postMessage({type: r <= 0 ? 'DONE' : 'TICK', remaining: r, phase: payload.phase})));
      if (r <= 0) { clearInterval(iv); iv = null; }
    }, 1000);
  } else if (type === 'STOP') { clearInterval(iv); iv = null; }
});`;

try {
  const blob = new Blob([swCode], {type: 'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data.type === 'TICK') { state.secondsLeft = e.data.remaining; updateDisplay(); }
    else if (e.data.type === 'DONE') phaseComplete();
  });
} catch(e) {}

loadStorage();
applyTheme();
initPhase('focus');
</script>
</body>
</html>
